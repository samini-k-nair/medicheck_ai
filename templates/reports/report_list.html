{% extends 'base.html' %}
{% load humanize %}

{% block section %}
  <div class="container my-5">
    <h1>Your Reports</h1>
    <ul class="list-group">
      {% for report in reports %}
        <li class="list-group-item d-flex justify-content-between align-items-center">
          <span>
            <i class="bi bi-file-earmark-text"></i>
            {{ report.uploaded_at|naturaltime }} <!-- e.g., “2 hours ago” -->
          </span>
          <span>
            {% if report.has_file %}
              <a href="{% url 'report_download' report.pk %}" class="btn btn-sm btn-outline-primary me-2">
                View
              </a>
            {% endif %}
            <a href="{% url 'report_delete' report.pk %}" class="btn btn-sm btn-outline-danger">
              Delete
            </a>
          </span>
        </li>
      {% empty %}
        <li class="list-group-item">No reports uploaded yet.</li>
      {% endfor %}
    </ul>
  </div>
{% endblock %}
